name: e_commerce_application
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+5
environment:
  sdk: ^3.8.1


  #--------[PACKAGES]------------
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  iconsax: ^0.0.8
  intl: ^0.19.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  readmore: ^3.0.0
  uuid: ^4.5.2
  flutter_branch_sdk: ^8.5.0
  razorpay_flutter: ^1.4.1
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.0.0



  get: ^4.6.6
  get_storage: ^2.1.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^6.2.1
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.1
  firebase_storage: ^13.0.6
  url_launcher: ^6.3.2
  change_app_package_name: ^1.5.0
  flutter_dotenv: ^6.0.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  #--------[ASSETS]------------
  assets:
    - assets/logo/
    - assets/animations/
    - assets/images/
    - assets/icons/categories/
    - assets/icons/payment_methods/
    - assets/banners/
    - assets/products/
    - assets/brands/
#    - assets/icons/payment_methods/


  #--------[FONTS]------------
  fonts:
    - family: 'Nunito'
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 800


flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo/logo_light.png" # 👈 Light mode ka logo (Blue wala)

  color_dark: "#121212"
  image_dark: "assets/logo/logo_dark.png" # 👈 Dark mode ka logo (Yeh zaroori hai!)

  android_12:
    color: "#FFFFFF"
    image: "assets/logo/logo_light.png"
    color_dark: "#121212"
    image_dark: "assets/logo/logo_dark.png"

  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo_light.png" # Default logo

  # iOS 18+ Dark Mode Icon
  image_path_ios_dark_tint: "assets/logo/logo_dark.png"

  # Android Adaptive Icon (Light Mode)
  adaptive_icon_background: "#FFFFFF" # Background color (white)
  adaptive_icon_foreground: "assets/logo/logo_light.png"

  # Android 13+ Themed/Monochrome Icon (Dark Mode ke liye)
  monochrome_icon: "assets/logo/logo_dark.png"
